<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match Commentary</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #161b22 0%, #1a2332 100%);
      border-bottom: 1px solid #30363d;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 0.75rem; }
    .header-icon { font-size: 1.5rem; }
    .header-title { font-size: 1.1rem; font-weight: 700; color: #f0f6fc; }
    .header-sub { font-size: 0.75rem; color: #8b949e; margin-top: 2px; }
    .live-badge {
      display: flex; align-items: center; gap: 0.4rem;
      background: rgba(248, 81, 73, 0.15);
      border: 1px solid rgba(248, 81, 73, 0.4);
      color: #f85149;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
      text-transform: uppercase;
    }
    .live-dot {
      width: 6px; height: 6px;
      background: #f85149;
      border-radius: 50%;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Main layout ── */
    main { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

    /* ── State cards (loading / error / empty) ── */
    .state-card {
      text-align: center;
      padding: 4rem 2rem;
      color: #8b949e;
    }
    .state-card .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .state-card p { font-size: 0.9rem; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Commentary feed ── */
    #feed { display: flex; flex-direction: column; gap: 0.75rem; }

    .entry {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 0 1rem;
      transition: border-color 0.2s;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .entry:hover { border-color: #30363d; }

    /* event-type colour strips */
    .entry.goal       { border-left: 3px solid #3fb950; }
    .entry.yellow_card{ border-left: 3px solid #d29922; }
    .entry.red_card   { border-left: 3px solid #f85149; }
    .entry.substitution { border-left: 3px solid #58a6ff; }
    .entry.foul       { border-left: 3px solid #bc8cff; }
    .entry.other      { border-left: 3px solid #8b949e; }

    /* minute column */
    .minute-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 2px;
      gap: 0.35rem;
    }
    .event-icon { font-size: 1.4rem; line-height: 1; }
    .minute-badge {
      font-size: 0.7rem;
      font-weight: 700;
      color: #8b949e;
      white-space: nowrap;
    }

    /* content column */
    .entry-content { min-width: 0; }
    .entry-header {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.4rem;
    }
    .actor { font-weight: 700; font-size: 0.95rem; color: #f0f6fc; }
    .team  { font-size: 0.78rem; color: #8b949e; }
    .period-chip {
      font-size: 0.68rem;
      background: #21262d;
      color: #8b949e;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      border: 1px solid #30363d;
      margin-left: auto;
    }
    .message {
      font-size: 0.88rem;
      color: #c9d1d9;
      line-height: 1.55;
      margin-bottom: 0.6rem;
    }

    /* meta row */
    .meta-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      font-size: 0.75rem;
      color: #8b949e;
      margin-bottom: 0.55rem;
    }
    .meta-item { display: flex; align-items: center; gap: 0.3rem; }
    .score-pill {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 0.15rem 0.5rem;
      font-weight: 700;
      font-size: 0.78rem;
      color: #e6edf3;
    }

    /* tags */
    .tags { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .tag {
      font-size: 0.68rem;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      background: #21262d;
      border: 1px solid #30363d;
      color: #8b949e;
    }
    .tag.goal        { background: rgba(63,185,80,.12); border-color: rgba(63,185,80,.3); color: #3fb950; }
    .tag.highlight   { background: rgba(210,153,34,.12); border-color: rgba(210,153,34,.3); color: #d29922; }
    .tag.free-kick   { background: rgba(88,166,255,.12); border-color: rgba(88,166,255,.3); color: #58a6ff; }

    /* ── refresh button ── */
    .refresh-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 1rem;
    }
    .btn-refresh {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      font-size: 0.8rem;
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.15s;
    }
    .btn-refresh:hover { background: #30363d; }
    .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <span class="header-icon">⚽</span>
    <div>
      <div class="header-title">Match Commentary</div>
      <div class="header-sub" id="header-sub">Loading match…</div>
    </div>
  </div>
  <div class="live-badge"><div class="live-dot"></div>Live</div>
</header>

<main>
  <div class="refresh-bar">
    <button class="btn-refresh" id="btn-refresh" onclick="load()">
      <span id="refresh-icon">↻</span> Refresh
    </button>
  </div>
  <div id="feed">
    <div class="state-card">
      <div class="spinner"></div>
      <p>Fetching commentary…</p>
    </div>
  </div>
</main>

<script>
  const EVENT_ICONS = {
    goal:         '⚽',
    assist:       '🅰️',
    yellow_card:  '🟨',
    red_card:     '🟥',
    substitution: '🔄',
    foul:         '⚠️',
    offside:      '🚩',
    corner:       '🚩',
    penalty:      '🎯',
    other:        '📋',
  };

  // Read matchId from ?matchId=X, default to 1
  const params  = new URLSearchParams(location.search);
  const matchId = params.get('matchId') || '1';

  async function load() {
    const btn  = document.getElementById('btn-refresh');
    const icon = document.getElementById('refresh-icon');
    const feed = document.getElementById('feed');

    btn.disabled  = true;
    icon.style.animation = 'spin 0.6s linear infinite';

    try {
      const res  = await fetch(`/matches/${matchId}/commentary`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { data } = await res.json();

      document.getElementById('header-sub').textContent =
        `Match #${matchId} · ${data.length} event${data.length !== 1 ? 's' : ''}`;

      if (data.length === 0) {
        feed.innerHTML = `<div class="state-card"><div class="icon">📭</div><p>No commentary yet for this match.</p></div>`;
        return;
      }

      feed.innerHTML = data.map(renderEntry).join('');
    } catch (err) {
      feed.innerHTML = `<div class="state-card"><div class="icon">⚠️</div><p>Failed to load: ${err.message}</p></div>`;
    } finally {
      btn.disabled = false;
      icon.style.animation = '';
    }
  }

  function renderEntry(e) {
    const icon   = EVENT_ICONS[e.eventType] ?? '📋';
    const meta   = e.metadata ?? {};
    const score  = meta.score ? `${meta.score.home}–${meta.score.away}` : null;
    const assist = meta.assistBy ? `Assist: ${meta.assistBy}` : null;
    const xg     = meta.xG != null ? `xG ${meta.xG}` : null;

    const metaItems = [score, assist, xg]
      .filter(Boolean)
      .map(v => v === score
        ? `<span class="meta-item">🏆 <span class="score-pill">${v}</span></span>`
        : `<span class="meta-item">${v}</span>`)
      .join('');

    const tags = (e.tags ?? [])
      .map(t => `<span class="tag ${t}">${t}</span>`)
      .join('');

    return `
      <div class="entry ${e.eventType}">
        <div class="minute-col">
          <span class="event-icon">${icon}</span>
          <span class="minute-badge">${e.minute ?? 0}'</span>
        </div>
        <div class="entry-content">
          <div class="entry-header">
            <span class="actor">${esc(e.actor ?? '—')}</span>
            <span class="team">${esc(e.team ?? '')}</span>
            <span class="period-chip">${esc(e.period ?? '')}</span>
          </div>
          <p class="message">${esc(e.message)}</p>
          ${metaItems ? `<div class="meta-row">${metaItems}</div>` : ''}
          ${tags       ? `<div class="tags">${tags}</div>` : ''}
        </div>
      </div>`;
  }

  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  load();
</script>
</body>
</html>
