<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match Commentary</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #161b22 0%, #1a2332 100%);
      border-bottom: 1px solid #30363d;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .header-left { display: flex; align-items: center; gap: 0.75rem; }
    .header-icon { font-size: 1.4rem; }
    .header-title { font-size: 1rem; font-weight: 700; color: #f0f6fc; }
    .header-sub   { font-size: 0.72rem; color: #8b949e; margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 0.6rem; }

    /* ws status */
    .ws-badge {
      display: flex; align-items: center; gap: 0.35rem;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.28rem 0.65rem;
      border-radius: 999px;
      border: 1px solid;
      transition: all 0.3s;
    }
    .ws-badge.connected    { background: rgba(63,185,80,.12);  border-color: rgba(63,185,80,.4);  color: #3fb950; }
    .ws-badge.disconnected { background: rgba(139,148,158,.1); border-color: rgba(139,148,158,.3); color: #8b949e; }
    .ws-badge.reconnecting { background: rgba(210,153,34,.12); border-color: rgba(210,153,34,.4);  color: #d29922; }
    .ws-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
    }
    .ws-badge.connected .ws-dot { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* live badge */
    .live-badge {
      display: flex; align-items: center; gap: 0.35rem;
      background: rgba(248,81,73,.12); border: 1px solid rgba(248,81,73,.4);
      color: #f85149; font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.05em; padding: 0.28rem 0.65rem;
      border-radius: 999px; text-transform: uppercase;
    }
    .live-dot {
      width: 6px; height: 6px; background: #f85149;
      border-radius: 50%; animation: pulse 1.4s ease-in-out infinite;
    }

    /* ── Layout ── */
    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 1.25rem;
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.25rem 1.25rem 4rem;
    }
    @media (max-width: 800px) {
      .layout { grid-template-columns: 1fr; }
    }

    /* ── Form panel ── */
    .form-panel {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 1.25rem;
      align-self: start;
      position: sticky;
      top: 70px;
    }
    .panel-title {
      font-size: 0.85rem; font-weight: 700; color: #f0f6fc;
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.4rem;
    }

    /* form fields */
    .field { margin-bottom: 0.8rem; }
    .field label {
      display: block; font-size: 0.72rem; font-weight: 600;
      color: #8b949e; margin-bottom: 0.3rem; text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 0.82rem;
      padding: 0.45rem 0.65rem;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: #58a6ff;
    }
    .field textarea { resize: vertical; min-height: 60px; }
    .field select option { background: #161b22; }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }

    .btn-submit {
      width: 100%;
      background: #238636;
      border: 1px solid rgba(63,185,80,.4);
      color: #fff;
      font-size: 0.82rem; font-weight: 600;
      padding: 0.55rem;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 0.25rem;
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      transition: background 0.15s;
    }
    .btn-submit:hover:not(:disabled) { background: #2ea043; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    /* toast */
    #toast {
      font-size: 0.75rem;
      border-radius: 6px;
      padding: 0.45rem 0.75rem;
      margin-top: 0.65rem;
      display: none;
      border: 1px solid;
    }
    #toast.success { background: rgba(63,185,80,.12); border-color: rgba(63,185,80,.4); color: #3fb950; }
    #toast.error   { background: rgba(248,81,73,.12);  border-color: rgba(248,81,73,.4);  color: #f85149; }

    /* ── Feed panel ── */
    .feed-panel { min-width: 0; }
    .feed-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.85rem;
    }
    .feed-title {
      font-size: 0.78rem; font-weight: 700; color: #8b949e;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .btn-refresh {
      background: #21262d; border: 1px solid #30363d;
      color: #c9d1d9; font-size: 0.75rem;
      padding: 0.35rem 0.8rem; border-radius: 6px;
      cursor: pointer; display: flex; align-items: center; gap: 0.35rem;
      transition: background 0.15s;
    }
    .btn-refresh:hover:not(:disabled) { background: #30363d; }
    .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Entries ── */
    #feed { display: flex; flex-direction: column; gap: 0.65rem; }

    .state-card {
      text-align: center; padding: 3.5rem 2rem; color: #8b949e;
    }
    .state-card .icon { font-size: 2.2rem; margin-bottom: 0.6rem; }
    .state-card p { font-size: 0.85rem; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #30363d; border-top-color: #58a6ff;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 0.8rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .entry {
      background: #161b22; border: 1px solid #21262d;
      border-radius: 10px; padding: 0.9rem 1.1rem;
      display: grid; grid-template-columns: 48px 1fr;
      gap: 0 0.9rem;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .entry:hover { border-color: #30363d; }
    .entry.new-flash { animation: flashGreen 1.2s ease; }
    @keyframes flashGreen {
      0%   { border-color: #3fb950; box-shadow: 0 0 0 2px rgba(63,185,80,.2); }
      100% { border-color: #21262d; box-shadow: none; }
    }

    .entry.goal         { border-left: 3px solid #3fb950; }
    .entry.assist       { border-left: 3px solid #79c0ff; }
    .entry.yellow_card  { border-left: 3px solid #d29922; }
    .entry.red_card     { border-left: 3px solid #f85149; }
    .entry.substitution { border-left: 3px solid #58a6ff; }
    .entry.foul         { border-left: 3px solid #bc8cff; }
    .entry.penalty      { border-left: 3px solid #ff7b72; }
    .entry.offside,
    .entry.corner       { border-left: 3px solid #e3b341; }
    .entry.other        { border-left: 3px solid #8b949e; }

    .minute-col {
      display: flex; flex-direction: column;
      align-items: center; padding-top: 2px; gap: 0.3rem;
    }
    .event-icon   { font-size: 1.3rem; line-height: 1; }
    .minute-badge { font-size: 0.68rem; font-weight: 700; color: #8b949e; white-space: nowrap; }

    .entry-content { min-width: 0; }
    .entry-header {
      display: flex; align-items: baseline; gap: 0.45rem;
      flex-wrap: wrap; margin-bottom: 0.35rem;
    }
    .actor { font-weight: 700; font-size: 0.9rem; color: #f0f6fc; }
    .team  { font-size: 0.75rem; color: #8b949e; }
    .period-chip {
      font-size: 0.65rem; background: #21262d; color: #8b949e;
      padding: 0.12rem 0.45rem; border-radius: 999px;
      border: 1px solid #30363d; margin-left: auto;
    }
    .message {
      font-size: 0.85rem; color: #c9d1d9;
      line-height: 1.55; margin-bottom: 0.5rem;
    }
    .meta-row {
      display: flex; gap: 0.9rem; flex-wrap: wrap;
      font-size: 0.72rem; color: #8b949e; margin-bottom: 0.45rem;
    }
    .score-pill {
      background: #1f2937; border: 1px solid #374151;
      border-radius: 6px; padding: 0.12rem 0.45rem;
      font-weight: 700; font-size: 0.75rem; color: #e6edf3;
    }
    .tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .tag {
      font-size: 0.65rem; padding: 0.18rem 0.5rem;
      border-radius: 999px; background: #21262d;
      border: 1px solid #30363d; color: #8b949e;
    }
    .tag.goal      { background: rgba(63,185,80,.12); border-color: rgba(63,185,80,.3); color: #3fb950; }
    .tag.highlight { background: rgba(210,153,34,.12); border-color: rgba(210,153,34,.3); color: #d29922; }
    .tag.free-kick { background: rgba(88,166,255,.12); border-color: rgba(88,166,255,.3); color: #58a6ff; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-left">
    <span class="header-icon">⚽</span>
    <div>
      <div class="header-title">Match Commentary</div>
      <div class="header-sub" id="header-sub">Match #<span id="match-id-display"></span></div>
    </div>
  </div>
  <div class="header-right">
    <div class="ws-badge disconnected" id="ws-badge">
      <div class="ws-dot"></div>
      <span id="ws-label">Connecting…</span>
    </div>
    <div class="live-badge"><div class="live-dot"></div>Live</div>
  </div>
</header>

<!-- ── Layout ── -->
<div class="layout">

  <!-- Form panel -->
  <aside class="form-panel">
    <div class="panel-title">✏️ Add Commentary</div>
    <form id="commentary-form" autocomplete="off">

      <div class="field-row">
        <div class="field">
          <label>Minute</label>
          <input type="number" id="f-minutes" min="0" placeholder="e.g. 45" required />
        </div>
        <div class="field">
          <label>Sequence</label>
          <input type="number" id="f-sequence" min="0" placeholder="e.g. 12" required />
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Period</label>
          <input type="text" id="f-period" placeholder="1st Half" required />
        </div>
        <div class="field">
          <label>Event Type</label>
          <select id="f-eventType" required>
            <option value="">— select —</option>
            <option value="goal">⚽ Goal</option>
            <option value="assist">🅰️ Assist</option>
            <option value="yellow_card">🟨 Yellow Card</option>
            <option value="red_card">🟥 Red Card</option>
            <option value="substitution">🔄 Substitution</option>
            <option value="foul">⚠️ Foul</option>
            <option value="offside">🚩 Offside</option>
            <option value="corner">🚩 Corner</option>
            <option value="penalty">🎯 Penalty</option>
            <option value="other">📋 Other</option>
          </select>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Actor (Player)</label>
          <input type="text" id="f-actor" placeholder="e.g. Messi" required />
        </div>
        <div class="field">
          <label>Team</label>
          <input type="text" id="f-team" placeholder="e.g. Inter Miami" required />
        </div>
      </div>

      <div class="field">
        <label>Message</label>
        <textarea id="f-message" rows="2" placeholder="GOAL! Messi fires it home…" required></textarea>
      </div>

      <div class="field">
        <label>Tags <span style="color:#555;font-size:.65rem;text-transform:none">(comma-separated)</span></label>
        <input type="text" id="f-tags" placeholder="goal, highlight, free-kick" />
      </div>

      <div class="field">
        <label>Metadata <span style="color:#555;font-size:.65rem;text-transform:none">(JSON, optional)</span></label>
        <textarea id="f-metadata" rows="3" placeholder='{"xG": 0.08, "score": {"home": 2, "away": 1}}'></textarea>
      </div>

      <button class="btn-submit" id="btn-submit" type="submit">
        <span id="submit-icon">＋</span> Post Commentary
      </button>
      <div id="toast"></div>
    </form>
  </aside>

  <!-- Feed panel -->
  <section class="feed-panel">
    <div class="feed-header">
      <span class="feed-title">📡 Live Feed — <span id="event-count">0</span> events</span>
      <button class="btn-refresh" id="btn-refresh" onclick="loadFeed()">
        <span id="refresh-icon">↻</span> Refresh
      </button>
    </div>
    <div id="feed">
      <div class="state-card">
        <div class="spinner"></div>
        <p>Fetching commentary…</p>
      </div>
    </div>
  </section>

</div>

<script>
  /* ─────────────────────────────────────────────
     Constants & state
  ───────────────────────────────────────────── */
  const EVENT_ICONS = {
    goal:'⚽', assist:'🅰️', yellow_card:'🟨', red_card:'🟥',
    substitution:'🔄', foul:'⚠️', offside:'🚩', corner:'🚩',
    penalty:'🎯', other:'📋',
  };

  const qs      = new URLSearchParams(location.search);
  const matchId = qs.get('matchId') || '1';
  let   eventCount = 0;
  let   ws, reconnectDelay = 1000, reconnectTimer = null;

  document.getElementById('match-id-display').textContent = matchId;

  /* ─────────────────────────────────────────────
     1. GET – load all commentary from DB on open
  ───────────────────────────────────────────── */
  async function loadFeed() {
    const btn  = document.getElementById('btn-refresh');
    const icon = document.getElementById('refresh-icon');
    const feed = document.getElementById('feed');

    btn.disabled = true;
    icon.style.animation = 'spin 0.6s linear infinite';
    feed.innerHTML = '<div class="state-card"><div class="spinner"></div><p>Fetching commentary…</p></div>';

    try {
      const res = await fetch(`/matches/${matchId}/commentary`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const { data } = await res.json();

      eventCount = data.length;
      updateEventCount();

      if (data.length === 0) {
        feed.innerHTML = '<div class="state-card"><div class="icon">📭</div><p>No commentary yet. Post the first event!</p></div>';
      } else {
        // Data comes newest-first from the API; render in that order
        feed.innerHTML = data.map(renderEntry).join('');
      }
    } catch (err) {
      feed.innerHTML = `<div class="state-card"><div class="icon">⚠️</div><p>Failed to load: ${err.message}</p></div>`;
    } finally {
      btn.disabled = false;
      icon.style.animation = '';
    }
  }

  /* ─────────────────────────────────────────────
     2. POST – create commentary via form submit
  ───────────────────────────────────────────── */
  document.getElementById('commentary-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const metaRaw = document.getElementById('f-metadata').value.trim();
    let metadata  = {};
    if (metaRaw) {
      try { metadata = JSON.parse(metaRaw); }
      catch { return showToast('Metadata is not valid JSON.', 'error'); }
    }

    const body = {
      minutes:   parseInt(document.getElementById('f-minutes').value,  10),
      sequence:  parseInt(document.getElementById('f-sequence').value, 10),
      period:    document.getElementById('f-period').value.trim(),
      eventType: document.getElementById('f-eventType').value,
      actor:     document.getElementById('f-actor').value.trim(),
      team:      document.getElementById('f-team').value.trim(),
      message:   document.getElementById('f-message').value.trim(),
      metadata,
      tags: document.getElementById('f-tags').value
              .split(',').map(t => t.trim()).filter(Boolean),
    };

    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    document.getElementById('submit-icon').textContent = '…';

    try {
      const res = await fetch(`/matches/${matchId}/commentary`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
      });

      if (!res.ok) {
        const { error, details } = await res.json();
        const firstError = Object.values(details?.fieldErrors ?? {})?.[0]?.[0] ?? error;
        showToast(firstError, 'error');
      } else {
        showToast('Commentary posted! 🎉', 'success');
        e.target.reset();
        // The WS broadcast from the server will prepend the new entry automatically
      }
    } catch {
      showToast('Network error – please try again.', 'error');
    } finally {
      btn.disabled = false;
      document.getElementById('submit-icon').textContent = '＋';
    }
  });

  /* ─────────────────────────────────────────────
     3. WebSocket – real-time commentary events
  ───────────────────────────────────────────── */
  function connectWs() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}/ws`);

    ws.addEventListener('open', () => {
      reconnectDelay = 1000;
      clearTimeout(reconnectTimer);
      // Subscribe to this match's commentary channel
      ws.send(JSON.stringify({ type: 'subscribe', matchId: parseInt(matchId, 10) }));
      setWsStatus('connected', 'Live');
    });

    ws.addEventListener('message', (event) => {
      let msg;
      try { msg = JSON.parse(event.data); } catch { return; }

      if (msg.type === 'commentary' && String(msg.data?.matchId) === matchId) {
        // New commentary arrived – prepend to feed, clear empty state if needed
        const feed = document.getElementById('feed');
        const emptyState = feed.querySelector('.state-card');
        if (emptyState) feed.innerHTML = '';

        const node = document.createElement('div');
        node.innerHTML = renderEntry(msg.data);
        const entry = node.firstElementChild;
        entry.classList.add('new-flash');
        feed.insertBefore(entry, feed.firstChild);

        eventCount++;
        updateEventCount();
      }
    });

    ws.addEventListener('close', () => {
      setWsStatus('reconnecting', 'Reconnecting…');
      reconnectTimer = setTimeout(() => {
        reconnectDelay = Math.min(reconnectDelay * 2, 30000);
        connectWs();
      }, reconnectDelay);
    });

    ws.addEventListener('error', () => ws.close());
  }

  /* ─────────────────────────────────────────────
     Helpers
  ───────────────────────────────────────────── */
  function renderEntry(e) {
    const icon   = EVENT_ICONS[e.eventType] ?? '📋';
    const meta   = e.metadata ?? {};
    const score  = meta.score ? `${meta.score.home}–${meta.score.away}` : null;
    const assist = meta.assistBy ? `Assist: ${meta.assistBy}` : null;
    const xg     = meta.xG != null ? `xG ${meta.xG}` : null;

    const metaItems = [score, assist, xg].filter(Boolean)
      .map(v => v === score
        ? `<span>🏆 <span class="score-pill">${v}</span></span>`
        : `<span>${v}</span>`)
      .join('');

    const tags = (e.tags ?? [])
      .map(t => `<span class="tag ${esc(t)}">${esc(t)}</span>`)
      .join('');

    return `
      <div class="entry ${esc(e.eventType)}">
        <div class="minute-col">
          <span class="event-icon">${icon}</span>
          <span class="minute-badge">${e.minute ?? 0}'</span>
        </div>
        <div class="entry-content">
          <div class="entry-header">
            <span class="actor">${esc(e.actor ?? '—')}</span>
            <span class="team">${esc(e.team ?? '')}</span>
            <span class="period-chip">${esc(e.period ?? '')}</span>
          </div>
          <p class="message">${esc(e.message)}</p>
          ${metaItems ? `<div class="meta-row">${metaItems}</div>` : ''}
          ${tags       ? `<div class="tags">${tags}</div>`         : ''}
        </div>
      </div>`;
  }

  function updateEventCount() {
    document.getElementById('event-count').textContent = eventCount;
  }

  function setWsStatus(state, label) {
    const badge = document.getElementById('ws-badge');
    badge.className = `ws-badge ${state}`;
    document.getElementById('ws-label').textContent = label;
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = type;
    t.style.display = 'block';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.display = 'none'; }, 4000);
  }

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* ─────────────────────────────────────────────
     Boot
  ───────────────────────────────────────────── */
  loadFeed();   // 1. Hydrate feed from DB
  connectWs();  // 2. Open WS for real-time events
</script>
</body>
</html>
